[workspace]
channels = ["conda-forge"]
platforms = ["linux-64", "linux-aarch64", "osx-64", "osx-arm64", "win-64"]
preview = ["pixi-build"]

[tasks.publish]
cmd = "pixi upload prefix --channel raphaelribes ./pixitainer-0*.conda"
description = "Publish the built pixitainer package to the raphaelribes channel."

[tasks.publish_docker]
cmd = "pixi upload prefix --channel raphaelribes ./pixitainer-docker*.conda"
description = "Publish the built pixitainer-docker package to the raphaelribes channel."

[tasks.publish_singularity]
cmd = "pixi upload prefix --channel raphaelribes ./pixitainer-singularity*.conda"
description = "Publish the built pixitainer-singularity package to the raphaelribes channel."

[tasks.install]
cmd = "pixi global install --path pixitainer-0*.conda -c https://prefix.dev/conda-forge pixitainer --force-reinstall"

[tasks.install_singularity]
cmd = "pixi global install --path pixitainer-singularity*.conda -c https://prefix.dev/conda-forge pixitainer-singularity --force-reinstall"

[tasks.install_docker]
cmd = "pixi global install --path pixitainer-docker*.conda -c https://prefix.dev/conda-forge pixitainer-docker --force-reinstall"

[tasks.install_all]
depends-on = [
    {task = "install"},
    {task = "install_singularity"},
    {task = "install_docker"},
]

[package.build.backend]
name = "pixi-build-rattler-build"
version = ">=0.3.7"

[target.linux.dependencies]
pixitainer.path = "."